<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>__PROJECT__ · Conversaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --nav:#161e2e; --nav-2:#0f1623; --bg:#f5f6f8; --card:#ffffff;
    --line:#e6e8ee; --line-2:#eef0f4; --ink:#1c2433; --ink-soft:#6b7488;
    --accent:#2563eb; --accent-soft:#e8f0fe;
    --green:#16a34a; --amber:#d97706; --red:#dc2626;
    --bot:#2563eb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}

  /* ── LOGIN ── */
  #login{position:fixed;inset:0;background:linear-gradient(135deg,#0f1623,#1b2740);display:flex;align-items:center;justify-content:center;z-index:50}
  #login .box{background:#fff;border-radius:18px;padding:36px 34px;width:340px;box-shadow:0 30px 70px -30px rgba(0,0,0,.6)}
  #login .logo{width:42px;height:42px;border-radius:11px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px;margin-bottom:18px}
  #login h1{font-size:19px;font-weight:700;margin-bottom:4px}
  #login p{color:var(--ink-soft);font-size:13px;margin-bottom:20px}
  #login input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;margin-bottom:12px;outline:none}
  #login input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  #login button{width:100%;padding:12px;border:0;border-radius:10px;background:var(--accent);color:#fff;font-weight:600;font-size:14px}
  #login .err{color:var(--red);font-size:12.5px;height:16px;margin-top:2px}

  /* ── SHELL ── */
  #app{display:none;height:100vh;display:none;grid-template-columns:64px 340px 1fr 300px}
  #app.on{display:grid}
  @media(max-width:1100px){#app.on{grid-template-columns:64px 320px 1fr}#detail{display:none}}
  @media(max-width:760px){#app.on{grid-template-columns:64px 1fr}#list{display:none}#app.on.showchat #list{display:none}}

  /* nav rail */
  nav{background:var(--nav);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px}
  nav .brand{width:38px;height:38px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;margin-bottom:10px}
  nav .ic{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#8893a8}
  nav .ic.on{background:rgba(255,255,255,.08);color:#fff}
  nav .ic svg{width:20px;height:20px}
  nav .spacer{flex:1}

  /* list column */
  #list{background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  #list .head{padding:18px 18px 12px}
  #list .head h2{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
  #list .head .count{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-soft);border-radius:999px;padding:2px 9px}
  .search{margin:4px 18px 10px;position:relative}
  .search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:9px;font-size:13px;outline:none;background:#fafbfc}
  .search input:focus{border-color:var(--accent);background:#fff}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ink-soft)}
  .chips{display:flex;gap:7px;padding:0 18px 12px;flex-wrap:wrap}
  .chip{font-size:12px;font-weight:500;padding:5px 11px;border-radius:999px;border:1px solid var(--line);color:var(--ink-soft);background:#fff}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  #leads{flex:1;overflow-y:auto}
  .row{display:flex;gap:11px;padding:12px 18px;border-bottom:1px solid var(--line-2);cursor:pointer;align-items:center}
  .row:hover{background:#fafbfc}
  .row.active{background:var(--accent-soft)}
  .av{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:15px}
  .row .mid{flex:1;min-width:0}
  .row .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .ms{font-size:12.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .row .rt{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
  .row .tm{font-size:11px;color:#9aa3b5}
  .dot{width:9px;height:9px;border-radius:50%}
  .empty{padding:50px 24px;text-align:center;color:#9aa3b5;font-size:13px}

  .badge{font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:999px;text-transform:capitalize}
  .i-exploring{background:#dcfce7;color:#15803d}
  .i-interested{background:#fef3c7;color:#b45309}
  .i-booking{background:#fee2e2;color:#b91c1c}
  .i-escalate{background:#e5e7eb;color:#4b5563}

  /* chat column */
  #chat{display:flex;flex-direction:column;min-width:0;background:#f0f2f5}
  #chat .top{background:var(--card);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:12px}
  #chat .top .back{display:none;border:0;background:none;color:var(--ink-soft);font-size:20px;padding:0 6px 0 0}
  @media(max-width:760px){#chat .top .back{display:block}}
  #chat .top .nm{font-weight:600;font-size:15px}
  #chat .top .ph{font-size:12px;color:var(--ink-soft)}
  #msgs{flex:1;overflow-y:auto;padding:22px 26px;display:flex;flex-direction:column;gap:8px}
  .m{max-width:62%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.45;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 1px rgba(0,0,0,.04)}
  .m.user{align-self:flex-start;background:#fff;border-bottom-left-radius:4px}
  .m.assistant{align-self:flex-end;background:var(--bot);color:#fff;border-bottom-right-radius:4px}
  .stats{display:flex;gap:16px;padding:0 18px 10px;font-size:12px;color:var(--ink-soft)}
  .stats b{color:var(--ink);font-weight:700}
  .pausebtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--ink-soft);white-space:nowrap}
  .pausebtn.paused{background:#fef3c7;border-color:#fcd34d;color:#b45309}
  .composer{background:var(--card);border-top:1px solid var(--line);padding:12px 16px;display:flex;align-items:flex-end;gap:10px}
  .composer textarea{flex:1;border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-family:inherit;font-size:13.5px;resize:none;outline:none;max-height:120px;line-height:1.4}
  .composer textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .composer button{border:0;background:var(--accent);color:#fff;width:40px;height:40px;border-radius:50%;font-size:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .composer button:disabled{opacity:.45;cursor:default}
  .sendhint{font-size:11px;color:#9aa3b5;padding:0 20px 8px}
  .nochat{margin:auto;text-align:center;color:#9aa3b5}
  .nochat svg{width:54px;height:54px;opacity:.4;margin-bottom:10px}

  /* detail column */
  #detail{background:var(--card);border-left:1px solid var(--line);padding:26px 22px;overflow-y:auto}
  #detail .big{width:74px;height:74px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:27px}
  #detail .dn{text-align:center;font-size:17px;font-weight:700}
  #detail .dp{text-align:center;font-size:13px;color:var(--ink-soft);margin-top:2px}
  #detail .dbadge{text-align:center;margin:12px 0 18px}
  #detail .wa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;border-radius:10px;background:#25d366;color:#fff;font-weight:600;text-decoration:none;font-size:13.5px;margin-bottom:20px}
  #detail .field{border-top:1px solid var(--line-2);padding:13px 2px}
  #detail .field .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#9aa3b5;font-weight:600}
  #detail .field .v{font-size:14px;margin-top:3px}
  #detail .ph-detail{color:var(--ink-soft);text-align:center;margin-top:90px;font-size:13px}

  /* ── calendario ── */
  #calView{display:none;grid-column:2/-1;flex-direction:column;background:var(--bg);min-height:0}
  #app.calmode #list,#app.calmode #chat,#app.calmode #detail{display:none}
  #app.calmode #calView{display:flex}
  .cal-top{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--card);border-bottom:1px solid var(--line)}
  .cal-nav{display:flex;align-items:center;gap:12px}
  .cal-nav h2{font-size:18px;font-weight:700;min-width:170px;text-align:center;text-transform:capitalize}
  .cal-nav button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:18px;color:var(--ink-soft)}
  .cal-new{border:0;background:var(--accent);color:#fff;font-weight:600;padding:9px 16px;border-radius:9px;font-size:13.5px}
  .cal-wrap{flex:1;display:flex;min-height:0}
  .cal-cal{flex:1;display:flex;flex-direction:column;padding:14px 20px;min-width:0}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
  .cal-dow span{font-size:11px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;text-align:center;letter-spacing:.04em}
  .cal-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:6px;min-height:0}
  .cal-day{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:6px;display:flex;flex-direction:column;gap:3px;overflow:hidden;min-height:0}
  .cal-day.out{background:#f0f1f4;opacity:.5}
  .cal-day .dnum{font-size:12px;font-weight:600;color:var(--ink-soft);align-self:flex-start}
  .cal-day.today .dnum{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
  .appt{font-size:11px;background:var(--accent-soft);color:#1d4ed8;border-radius:5px;padding:2px 6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid var(--accent)}
  .cal-side{width:280px;border-left:1px solid var(--line);background:var(--card);padding:18px;overflow-y:auto;flex-shrink:0}
  .cal-side h3{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:12px}
  .up{position:relative;border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:8px}
  .up .ut{font-weight:600;font-size:13.5px;padding-right:16px}
  .up .uw{font-size:12px;color:var(--accent);margin-top:2px}
  .up .un{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .up .del{position:absolute;right:10px;top:8px;color:#c0c6d0;cursor:pointer;font-size:15px;line-height:1}
  .up .del:hover{color:var(--red)}
  @media(max-width:900px){.cal-side{display:none}}

  /* ── modal ── */
  .modal{position:fixed;inset:0;background:rgba(10,16,28,.55);display:flex;align-items:center;justify-content:center;z-index:40}
  .modal-box{background:#fff;border-radius:16px;padding:26px;width:360px;box-shadow:0 30px 70px -30px rgba(0,0,0,.6)}
  .modal-box h3{font-size:18px;font-weight:700;margin-bottom:10px}
  .modal-box label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin:10px 0 5px}
  .modal-box input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;outline:none;font-family:inherit}
  .modal-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .modal-err{color:var(--red);font-size:12.5px;min-height:16px;margin-top:8px}
  .modal-actions{display:flex;gap:10px;margin-top:6px}
  .btn-ghost{flex:1;padding:11px;border:1px solid var(--line);background:#fff;border-radius:9px;font-weight:600;color:var(--ink-soft)}
  .btn-primary{flex:2;padding:11px;border:0;background:var(--accent);color:#fff;border-radius:9px;font-weight:600}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <div class="logo">A</div>
    <h1>Panel de conversaciones</h1>
    <p>__PROJECT__ · acceso del estudio</p>
    <input id="pw" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button id="enter">Entrar</button>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav>
    <div class="brand">A</div>
    <div class="ic on" id="navConv" title="Conversaciones"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-9 8.35 8.5 8.5 0 0 1-3.9-.9L3 21l1.9-4.1A8.38 8.38 0 0 1 12 3.5a8.5 8.5 0 0 1 9 8z" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="ic" id="navCal" title="Calendario"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="spacer"></div>
    <div class="ic" title="Salir" id="logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  </nav>

  <!-- list -->
  <div id="list">
    <div class="head"><h2>Conversaciones <span class="count" id="count">0</span></h2></div>
    <div class="stats"><span><b id="stInt">0</b> interesados</span><span><b id="stBook">0</b> en reserva</span><span><b id="stNew">0</b> hoy</span></div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
      <input id="q" placeholder="Buscar lead…">
    </div>
    <div class="chips">
      <button class="chip on" data-f="all">Todos</button>
      <button class="chip" data-f="interested">🟡 Interesados</button>
      <button class="chip" data-f="booking">🔴 Reserva</button>
    </div>
    <div id="leads"></div>
  </div>

  <!-- chat -->
  <div id="chat">
    <div class="top">
      <button class="back" id="back">‹</button>
      <div class="av" id="ctAv" style="width:38px;height:38px;font-size:14px;display:none"></div>
      <div style="flex:1"><div class="nm" id="ctName">Selecciona un lead</div><div class="ph" id="ctPhone"></div></div>
      <button class="pausebtn" id="pauseBtn" style="display:none"></button>
    </div>
    <div id="msgs"><div class="nochat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 0 1-9 8.35 8.5 8.5 0 0 1-3.9-.9L3 21l1.9-4.1A8.38 8.38 0 0 1 12 3.5a8.5 8.5 0 0 1 9 8z" stroke-linecap="round" stroke-linejoin="round"/></svg><br>Elige una conversación de la izquierda</div></div>
    <div class="sendhint" id="sendHint" style="display:none"></div>
    <div class="composer" id="composer" style="display:none">
      <textarea id="reply" rows="1" placeholder="Escribe para tomar el control…"></textarea>
      <button id="sendBtn" title="Enviar">➤</button>
    </div>
  </div>

  <!-- detail -->
  <div id="detail"><div class="ph-detail">Selecciona un lead para ver su ficha</div></div>

  <!-- calendario -->
  <div id="calView">
    <div class="cal-top">
      <div class="cal-nav"><button id="calPrev">‹</button><h2 id="calMonth"></h2><button id="calNext">›</button></div>
      <button id="newAppt" class="cal-new">+ Nueva cita</button>
    </div>
    <div class="cal-wrap">
      <div class="cal-cal">
        <div class="cal-dow"><span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div class="cal-side">
        <h3>Próximas citas</h3>
        <div id="upList"></div>
      </div>
    </div>
  </div>
</div>

<!-- modal nueva cita -->
<div id="apptModal" class="modal" style="display:none">
  <div class="modal-box">
    <h3>Nueva cita</h3>
    <label>Lead</label>
    <input id="amLead" list="leadsDL" placeholder="Nombre o teléfono (opcional)">
    <datalist id="leadsDL"></datalist>
    <label>Fecha y hora</label>
    <input id="amWhen" type="datetime-local">
    <label>Título</label>
    <input id="amTitle" placeholder="Llamada con…">
    <div class="modal-err" id="amErr"></div>
    <div class="modal-actions"><button id="amCancel" class="btn-ghost">Cancelar</button><button id="amSave" class="btn-primary">Guardar cita</button></div>
  </div>
</div>

<script>
  // ── auth ──
  var KEY = new URLSearchParams(location.search).get('key') || sessionStorage.getItem('botpanel_key') || '';
  var leads = [], filter = 'all', search = '', active = null, curLead = null;
  var appts = [], calY = null, calM = null;

  function api(path){ return fetch('/admin/api/' + path + (path.indexOf('?')>-1?'&':'?') + 'key=' + encodeURIComponent(KEY)); }
  function apiPost(path, body){ return fetch('/admin/api/' + path + '?key=' + encodeURIComponent(KEY), { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }); }

  function tryAuth(k){
    KEY = k;
    return fetch('/admin/api/leads?key=' + encodeURIComponent(k)).then(function(r){
      if(!r.ok) throw 0;
      return r.json();
    }).then(function(L){
      sessionStorage.setItem('botpanel_key', k);
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').classList.add('on');
      leads = L; render(); start();
      return true;
    });
  }

  document.getElementById('enter').onclick = function(){
    var k = document.getElementById('pw').value.trim();
    tryAuth(k).catch(function(){ document.getElementById('err').textContent = 'Contraseña incorrecta'; });
  };
  document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('enter').click(); });
  document.getElementById('logout').onclick = function(){ sessionStorage.removeItem('botpanel_key'); location.href = location.pathname; };

  // ── helpers ──
  function esc(s){ var d=document.createElement('div'); d.textContent = s==null?'':s; return d.innerHTML; }
  function initials(n){ n=(n||'').trim(); if(!n) return '#'; var p=n.split(/\s+/); return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase(); }
  var PALETTE=['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d'];
  function color(s){ var h=0; s=s||''; for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return PALETTE[h%PALETTE.length]; }
  function ago(ts){ var s=Math.floor((Date.now()-ts)/1000); if(s<60)return 'ahora'; if(s<3600)return Math.floor(s/60)+'m'; if(s<86400)return Math.floor(s/3600)+'h'; var d=Math.floor(s/86400); return d===1?'ayer':d+'d'; }
  var LABEL={exploring:'explorando',interested:'interesado',booking:'reserva',escalate:'duda'};

  // ── render list ──
  function render(){
    var f = leads.filter(function(l){
      if(filter==='interested' && l.intent!=='interested' && l.intent!=='booking') return false;
      if(filter==='booking' && l.intent!=='booking') return false;
      if(search){ var hay=((l.name||'')+' '+l.phone+' '+(l.lastMessage||'')).toLowerCase(); if(hay.indexOf(search)<0) return false; }
      return true;
    });
    document.getElementById('count').textContent = leads.length;
    var ni=0, nb=0, nt=0, dayAgo=Date.now()-86400000;
    leads.forEach(function(l){ if(l.intent==='interested')ni++; if(l.intent==='booking')nb++; if(l.updatedAt>dayAgo)nt++; });
    document.getElementById('stInt').textContent=ni;
    document.getElementById('stBook').textContent=nb;
    document.getElementById('stNew').textContent=nt;
    var box = document.getElementById('leads');
    if(!f.length){ box.innerHTML = '<div class="empty">'+(leads.length?'Sin resultados':'Aún no hay conversaciones')+'</div>'; return; }
    box.innerHTML = f.map(function(l){
      var c = color(l.name||l.phone), it = l.intent||'exploring';
      var dotc = it==='booking'?'var(--red)':it==='interested'?'var(--amber)':it==='escalate'?'#9ca3af':'var(--green)';
      return '<div class="row'+(l.phone===active?' active':'')+'" onclick="open_(\''+l.phone+'\')">'
        + '<div class="av" style="background:'+c+'">'+esc(initials(l.name||l.phone))+'</div>'
        + '<div class="mid"><div class="nm">'+esc(l.name||l.phone)+'</div><div class="ms">'+esc(l.lastMessage||'')+'</div></div>'
        + '<div class="rt"><span class="tm">'+ago(l.updatedAt)+'</span><span class="dot" style="background:'+dotc+'"></span></div></div>';
    }).join('');
  }

  document.getElementById('q').oninput = function(e){ search = e.target.value.toLowerCase().trim(); render(); };
  Array.prototype.forEach.call(document.querySelectorAll('.chip'), function(ch){
    ch.onclick = function(){ document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');}); ch.classList.add('on'); filter = ch.dataset.f; render(); };
  });
  document.getElementById('back').onclick = function(){ document.getElementById('app').classList.remove('showchat'); };

  // ── open conversation ──
  function open_(phone){
    active = phone; render();
    document.getElementById('app').classList.add('showchat');
    var l = leads.filter(function(x){return x.phone===phone;})[0] || {phone:phone};
    var c = color(l.name||phone), it = l.intent||'exploring';

    var av = document.getElementById('ctAv'); av.style.display='flex'; av.style.background=c; av.textContent=initials(l.name||phone);
    document.getElementById('ctName').textContent = l.name || phone;
    document.getElementById('ctPhone').textContent = '+' + phone;

    curLead = l;
    document.getElementById('pauseBtn').style.display = 'block';
    document.getElementById('composer').style.display = 'flex';
    document.getElementById('sendHint').style.display = 'block';
    updatePauseUI(!!l.paused);

    api('conv/' + encodeURIComponent(phone)).then(function(r){return r.json();}).then(function(C){
      var box = document.getElementById('msgs');
      box.innerHTML = C.length ? C.map(function(m){ return '<div class="m '+m.role+'">'+esc(m.content)+'</div>'; }).join('') : '<div class="nochat">Sin mensajes guardados</div>';
      box.scrollTop = box.scrollHeight;

      document.getElementById('detail').innerHTML =
        '<div class="big" style="background:'+c+'">'+esc(initials(l.name||phone))+'</div>'
        + '<div class="dn">'+esc(l.name||phone)+'</div><div class="dp">+'+esc(phone)+'</div>'
        + '<div class="dbadge"><span class="badge i-'+it+'">'+(LABEL[it]||it)+'</span></div>'
        + '<a class="wa" href="https://wa.me/'+esc(phone)+'" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.3L2 22l4.8-1.4A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.8.8.8-2.8-.2-.3A8 8 0 1 1 12 20z"/></svg>Abrir en WhatsApp</a>'
        + '<div class="field"><div class="k">Intención</div><div class="v">'+(LABEL[it]||it)+'</div></div>'
        + '<div class="field"><div class="k">Última actividad</div><div class="v">'+ago(l.updatedAt)+'</div></div>'
        + '<div class="field"><div class="k">Mensajes</div><div class="v">'+C.length+'</div></div>'
        + apptFieldHTML(phone);
    });
  }
  window.open_ = open_;

  // ── toma de control: responder a mano + pausar el bot ──
  function appendBubble(role, content){
    var box = document.getElementById('msgs');
    if(box.querySelector('.nochat')) box.innerHTML = '';
    var d = document.createElement('div'); d.className = 'm ' + role; d.textContent = content;
    box.appendChild(d); box.scrollTop = box.scrollHeight;
  }
  function updatePauseUI(paused){
    var btn = document.getElementById('pauseBtn'), hint = document.getElementById('sendHint');
    if(paused){ btn.textContent = '🤖 Reactivar bot'; btn.classList.add('paused'); hint.textContent = 'Tú tienes el control · el bot está en pausa para este lead'; }
    else { btn.textContent = '✋ Pausar bot'; btn.classList.remove('paused'); hint.textContent = 'El bot responde solo · si escribes tú, tomas el control'; }
  }
  function togglePause(){
    if(!curLead) return;
    var ns = !curLead.paused;
    apiPost('pause', { phone: curLead.phone, paused: ns }).then(function(r){ return r.json(); }).then(function(){
      curLead.paused = ns; updatePauseUI(ns);
      var L = leads.filter(function(x){ return x.phone === curLead.phone; })[0]; if(L) L.paused = ns;
    });
  }
  function sendMsg(){
    if(!curLead) return;
    var ta = document.getElementById('reply'), txt = ta.value.trim(); if(!txt) return;
    var btn = document.getElementById('sendBtn'); btn.disabled = true;
    apiPost('send', { phone: curLead.phone, text: txt }).then(function(r){
      if(!r.ok) return r.json().then(function(e){ throw e; });
      ta.value = ''; ta.style.height = 'auto'; appendBubble('assistant', txt);
      curLead.paused = true; updatePauseUI(true);
      var L = leads.filter(function(x){ return x.phone === curLead.phone; })[0]; if(L) L.paused = true;
    }).catch(function(e){
      alert('No se pudo enviar: ' + ((e && e.error) || 'error') + '\n\nSi han pasado +24h desde el último mensaje del cliente, WhatsApp no permite texto libre (haría falta plantilla).');
    }).then(function(){ btn.disabled = false; });
  }
  document.getElementById('pauseBtn').onclick = togglePause;
  document.getElementById('sendBtn').onclick = sendMsg;
  (function(){
    var ta = document.getElementById('reply');
    ta.addEventListener('input', function(){ ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; });
    ta.addEventListener('keydown', function(e){ if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); } });
  })();

  // ── CALENDARIO ──
  function loadAppts(cb){ api('appts').then(function(r){return r.json();}).then(function(A){ appts = A; if(cb) cb(); }).catch(function(){}); }
  function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
  function timeOf(iso){ var d=new Date(iso); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
  function fmtWhen(iso){ var d=new Date(iso); return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'})+' · '+timeOf(iso); }
  function nextApptFor(phone){ var now=Date.now()-3600000; return appts.filter(function(a){ return a.phone===phone && new Date(a.when).getTime()>=now; }).sort(function(a,b){ return new Date(a.when)-new Date(b.when); })[0]; }
  function apptFieldHTML(phone){ var a=nextApptFor(phone); if(!a) return ''; return '<div class="field"><div class="k">Próxima cita</div><div class="v">'+esc(a.title)+'<br><span style="color:var(--accent);font-size:13px">'+fmtWhen(a.when)+'</span></div></div>'; }

  function renderCal(){
    if(calY==null){ var n=new Date(); calY=n.getFullYear(); calM=n.getMonth(); }
    document.getElementById('calMonth').textContent = new Date(calY,calM,1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
    var startDow=(new Date(calY,calM,1).getDay()+6)%7, daysInMonth=new Date(calY,calM+1,0).getDate(), today=new Date();
    var html='';
    for(var i=0;i<42;i++){
      var d=new Date(calY,calM,i-startDow+1);
      var out=d.getMonth()!==calM, isToday=sameDay(d,today);
      var da=appts.filter(function(a){ return sameDay(new Date(a.when),d); }).sort(function(a,b){ return new Date(a.when)-new Date(b.when); });
      var chips=da.slice(0,3).map(function(a){ return '<div class="appt" onclick="cancelAppt(event,\''+a.id+'\')" title="'+esc(a.title)+'">'+timeOf(a.when)+' '+esc(a.title)+'</div>'; }).join('');
      if(da.length>3) chips+='<div class="appt" style="background:none;border:0;color:#9aa3b5">+'+(da.length-3)+' más</div>';
      html+='<div class="cal-day'+(out?' out':'')+(isToday?' today':'')+'"><span class="dnum">'+d.getDate()+'</span>'+chips+'</div>';
    }
    document.getElementById('calGrid').innerHTML=html;
    var now=Date.now()-3600000;
    var up=appts.filter(function(a){ return new Date(a.when).getTime()>=now; }).sort(function(a,b){ return new Date(a.when)-new Date(b.when); }).slice(0,12);
    document.getElementById('upList').innerHTML = up.length ? up.map(function(a){
      return '<div class="up"><span class="del" onclick="cancelAppt(event,\''+a.id+'\')">✕</span><div class="ut">'+esc(a.title)+'</div><div class="uw">'+fmtWhen(a.when)+'</div>'+((a.name||a.phone)?'<div class="un">'+esc(a.name||('+'+a.phone))+'</div>':'')+'</div>';
    }).join('') : '<div style="color:#9aa3b5;font-size:13px">Sin citas próximas</div>';
  }

  function cancelAppt(e,id){ e.stopPropagation(); if(!confirm('¿Cancelar esta cita?')) return; fetch('/admin/api/appts/'+id+'?key='+encodeURIComponent(KEY),{method:'DELETE'}).then(function(){ loadAppts(renderCal); }); }
  window.cancelAppt=cancelAppt;

  function buildLeadsDL(){ document.getElementById('leadsDL').innerHTML = leads.map(function(l){ return '<option value="'+esc((l.name||l.phone)+' (+'+l.phone+')')+'">'; }).join(''); }
  function setNav(id){ ['navConv','navCal'].forEach(function(n){ document.getElementById(n).classList.toggle('on', n===id); }); }

  document.getElementById('navConv').onclick=function(){ document.getElementById('app').classList.remove('calmode'); setNav('navConv'); };
  document.getElementById('navCal').onclick=function(){ document.getElementById('app').classList.add('calmode'); setNav('navCal'); buildLeadsDL(); loadAppts(renderCal); };
  document.getElementById('calPrev').onclick=function(){ calM--; if(calM<0){calM=11;calY--;} renderCal(); };
  document.getElementById('calNext').onclick=function(){ calM++; if(calM>11){calM=0;calY++;} renderCal(); };
  document.getElementById('newAppt').onclick=function(){ buildLeadsDL(); document.getElementById('amErr').textContent=''; document.getElementById('apptModal').style.display='flex'; };
  document.getElementById('amCancel').onclick=function(){ document.getElementById('apptModal').style.display='none'; };
  document.getElementById('amSave').onclick=function(){
    var when=document.getElementById('amWhen').value;
    if(!when){ document.getElementById('amErr').textContent='Pon fecha y hora'; return; }
    var lv=document.getElementById('amLead').value.trim(), phone='', name='', m=lv.match(/\((\+?\d[\d ]*)\)/);
    if(m){ phone=m[1].replace(/\D/g,''); name=lv.replace(/\s*\(.*\)\s*/,'').trim(); }
    else if(/^\+?\d[\d ]*$/.test(lv)){ phone=lv.replace(/\D/g,''); }
    else { name=lv; }
    var title=document.getElementById('amTitle').value.trim()||'Cita';
    apiPost('appts',{phone:phone,name:name,title:title,when:when}).then(function(r){return r.json();}).then(function(){
      document.getElementById('apptModal').style.display='none';
      document.getElementById('amWhen').value=''; document.getElementById('amTitle').value=''; document.getElementById('amLead').value='';
      loadAppts(renderCal);
    });
  };

  // ── refresco ──
  var timer = null;
  function start(){
    loadAppts();
    if(timer) clearInterval(timer);
    timer = setInterval(function(){
      api('leads').then(function(r){return r.json();}).then(function(L){ leads = L; render(); });
      loadAppts(function(){ if(document.getElementById('app').classList.contains('calmode')) renderCal(); });
    }, 10000);
  }

  // auto-login si viene ?key= o hay sesión
  if(KEY){ tryAuth(KEY).catch(function(){ /* mostrar login */ }); }
</script>
</body>
</html>
